workflows:
  smart-accountant-android:
    name: المحاسب الذكي - Android
    max_build_duration: 60
    environment:
      node: 18.16.0
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android APK
        script: npx eas build -p android --profile preview --non-interactive
    artifacts:
      - build/*.apk

  smart-accountant-ios:
    name: المحاسب الذكي - iOS
    max_build_duration: 60
    environment:
      node: 18.16.0
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build iOS
        script: npx eas build -p ios --profile preview --non-interactive
    artifacts:
      - build/*.ipa
