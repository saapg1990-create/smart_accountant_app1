workflows:
  smart-accountant:
    name: المحاسب الذكي
    max_build_duration: 60
    environment:
      node: 18.16.0
      vars:
        EAS_NO_VCS: "1"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Build APK
        script: eas build -p android --profile preview --non-interactive
    artifacts:
      - build/*.apk
